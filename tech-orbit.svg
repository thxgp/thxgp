<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="800" height="450">
  <style>
    @keyframes spin-cw {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }
    @keyframes spin-ccw {
      from { transform: rotate(0deg); }
      to { transform: rotate(-360deg); }
    }
    @keyframes pulse {
      0%, 100% { opacity: 0.15; }
      50% { opacity: 0.35; }
    }
    @keyframes center-breathe {
      0%, 100% { r: 36; opacity: 0.2; }
      50% { r: 44; opacity: 0.4; }
    }

    /* Orbit arm rotates around (0,0) of its translated group */
    .orbit-cw  { animation: spin-cw 30s linear infinite; transform-origin: 0 0; }
    .orbit-ccw { animation: spin-ccw 50s linear infinite; transform-origin: 0 0; }

    /* Counter-rotation on the icon itself, around its own center */
    .unrotate-cw  { animation: spin-ccw 30s linear infinite; transform-origin: 0 0; }
    .unrotate-ccw { animation: spin-cw 50s linear infinite; transform-origin: 0 0; }

    /* Phase delays */
    .d0  { animation-delay: 0s; }
    .d1i { animation-delay: -3.75s; }
    .d2i { animation-delay: -7.5s; }
    .d3i { animation-delay: -11.25s; }
    .d4i { animation-delay: -15s; }
    .d5i { animation-delay: -18.75s; }
    .d6i { animation-delay: -22.5s; }
    .d7i { animation-delay: -26.25s; }

    .d1o { animation-delay: -7.143s; }
    .d2o { animation-delay: -14.286s; }
    .d3o { animation-delay: -21.429s; }
    .d4o { animation-delay: -28.571s; }
    .d5o { animation-delay: -35.714s; }
    .d6o { animation-delay: -42.857s; }

    .ring-glow-1 { animation: pulse 4s ease-in-out infinite; }
    .ring-glow-2 { animation: pulse 4s ease-in-out infinite 2s; }
    .center-glow { animation: center-breathe 3s ease-in-out infinite; }
  </style>

  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="50%" stop-color="#111827"/>
      <stop offset="100%" stop-color="#0d1117"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#667eea"/>
      <stop offset="100%" stop-color="#764ba2"/>
    </linearGradient>
    <pattern id="dots" width="24" height="24" patternUnits="userSpaceOnUse">
      <circle cx="12" cy="12" r="0.6" fill="#c9d1d9"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="800" height="450" rx="12" fill="url(#bg)"/>
  <rect width="800" height="450" rx="12" fill="url(#dots)" opacity="0.035"/>

  <!-- Orbit rings -->
  <circle cx="400" cy="225" r="95" fill="none" stroke="#667eea" stroke-width="0.6" stroke-dasharray="4 8" opacity="0.3"/>
  <circle cx="400" cy="225" r="175" fill="none" stroke="#764ba2" stroke-width="0.6" stroke-dasharray="4 8" opacity="0.3"/>
  <circle cx="400" cy="225" r="95" fill="none" stroke="#667eea" stroke-width="4" class="ring-glow-1"/>
  <circle cx="400" cy="225" r="175" fill="none" stroke="#764ba2" stroke-width="4" class="ring-glow-2"/>

  <!-- Center hub -->
  <circle cx="400" cy="225" r="32" fill="#141926" stroke="url(#accent)" stroke-width="2"/>
  <circle cx="400" cy="225" fill="#667eea" class="center-glow"/>
  <text x="400" y="233" text-anchor="middle" font-family="monospace" font-size="24" font-weight="bold" fill="url(#accent)">&lt;/&gt;</text>

  <!-- ===== INNER ORBIT (r=95, clockwise, 30s) ===== -->

  <!-- Python - two interlocking snakes simplified -->
  <g transform="translate(400,225)">
    <g class="orbit-cw d0">
      <g transform="translate(95,0)">
        <g class="unrotate-cw d0">
          <circle r="20" fill="#141926" stroke="#3776AB" stroke-width="1.3"/>
          <g transform="translate(-10,-10) scale(0.833)">
            <path d="M12.1 2C6.6 2 6.2 4.5 6.2 4.5L6.2 7.1H12.3V8H4.1C4.1 8 1 7.6 1 13.2C1 18.8 3.7 18.6 3.7 18.6H5.8V15.8C5.8 15.8 5.7 13.1 8.4 13.1H14.4C14.4 13.1 16.9 13.2 16.9 10.7V5.1C16.9 5.1 17.3 2 12.1 2ZM8.6 3.8C9.2 3.8 9.7 4.3 9.7 4.9C9.7 5.5 9.2 6 8.6 6C8 6 7.5 5.5 7.5 4.9C7.5 4.3 8 3.8 8.6 3.8Z" fill="#3776AB"/>
            <path d="M11.9 22C17.4 22 17.8 19.5 17.8 19.5L17.8 16.9H11.7V16H19.9C19.9 16 23 16.4 23 10.8C23 5.2 20.3 5.4 20.3 5.4H18.2V8.2C18.2 8.2 18.3 10.9 15.6 10.9H9.6C9.6 10.9 7.1 10.8 7.1 13.3V18.9C7.1 18.9 6.7 22 11.9 22ZM15.4 20.2C14.8 20.2 14.3 19.7 14.3 19.1C14.3 18.5 14.8 18 15.4 18C16 18 16.5 18.5 16.5 19.1C16.5 19.7 16 20.2 15.4 20.2Z" fill="#FFD43B"/>
          </g>
        </g>
      </g>
    </g>
  </g>

  <!-- JavaScript - yellow square with JS -->
  <g transform="translate(400,225)">
    <g class="orbit-cw d1i">
      <g transform="translate(95,0)">
        <g class="unrotate-cw d1i">
          <circle r="20" fill="#141926" stroke="#F7DF1E" stroke-width="1.3"/>
          <rect x="-10" y="-10" width="20" height="20" rx="2" fill="#F7DF1E"/>
          <text x="1" y="6" text-anchor="middle" font-family="'Segoe UI',Helvetica,Arial,sans-serif" font-size="12" font-weight="900" fill="#000">JS</text>
        </g>
      </g>
    </g>
  </g>

  <!-- React - atom with 3 elliptical orbits -->
  <g transform="translate(400,225)">
    <g class="orbit-cw d2i">
      <g transform="translate(95,0)">
        <g class="unrotate-cw d2i">
          <circle r="20" fill="#141926" stroke="#61DAFB" stroke-width="1.3"/>
          <circle r="2.5" fill="#61DAFB"/>
          <ellipse rx="11" ry="4.2" fill="none" stroke="#61DAFB" stroke-width="1"/>
          <ellipse rx="11" ry="4.2" fill="none" stroke="#61DAFB" stroke-width="1" transform="rotate(60)"/>
          <ellipse rx="11" ry="4.2" fill="none" stroke="#61DAFB" stroke-width="1" transform="rotate(120)"/>
        </g>
      </g>
    </g>
  </g>

  <!-- HTML5 - shield shape -->
  <g transform="translate(400,225)">
    <g class="orbit-cw d3i">
      <g transform="translate(95,0)">
        <g class="unrotate-cw d3i">
          <circle r="20" fill="#141926" stroke="#E34F26" stroke-width="1.3"/>
          <g transform="translate(-9,-11) scale(0.75)">
            <path d="M2 0L4 24L14 27L24 24L26 0Z" fill="#E34F26"/>
            <path d="M14 2.5V25L21.5 22.8L23.2 2.5Z" fill="#EF652A"/>
            <path d="M7.5 8H14V12.5H8.2L7.5 8ZM8.5 14.5H14V19L10 17.8L8.5 14.5Z" fill="#fff"/>
            <path d="M14 8H20.5L19.8 14.5H14V12.5H18L18.3 8H14ZM14 19V14.5H19.5L18.5 17.8L14 19Z" fill="#EBEBEB"/>
          </g>
        </g>
      </g>
    </g>
  </g>

  <!-- CSS3 - shield shape -->
  <g transform="translate(400,225)">
    <g class="orbit-cw d4i">
      <g transform="translate(95,0)">
        <g class="unrotate-cw d4i">
          <circle r="20" fill="#141926" stroke="#1572B6" stroke-width="1.3"/>
          <g transform="translate(-9,-11) scale(0.75)">
            <path d="M2 0L4 24L14 27L24 24L26 0Z" fill="#1572B6"/>
            <path d="M14 2.5V25L21.5 22.8L23.2 2.5Z" fill="#33A9DC"/>
            <path d="M7.5 8H14V12.5H11L7.5 8ZM8 14.5H14V19L10 17.8L8 14.5Z" fill="#fff"/>
            <path d="M14 8H20.5L19.8 14.5H14V12.5H18L18.3 8H14ZM14 19V14.5H19.5L18.5 17.8L14 19Z" fill="#EBEBEB"/>
          </g>
        </g>
      </g>
    </g>
  </g>

  <!-- SQL - database cylinder -->
  <g transform="translate(400,225)">
    <g class="orbit-cw d5i">
      <g transform="translate(95,0)">
        <g class="unrotate-cw d5i">
          <circle r="20" fill="#141926" stroke="#4169E1" stroke-width="1.3"/>
          <ellipse cx="0" cy="-7" rx="9" ry="4" fill="none" stroke="#4169E1" stroke-width="1.5"/>
          <path d="M-9,-7 L-9,7" fill="none" stroke="#4169E1" stroke-width="1.5"/>
          <path d="M9,-7 L9,7" fill="none" stroke="#4169E1" stroke-width="1.5"/>
          <ellipse cx="0" cy="7" rx="9" ry="4" fill="none" stroke="#4169E1" stroke-width="1.5"/>
          <path d="M-9,0 Q-9,4 0,4 Q9,4 9,0" fill="none" stroke="#4169E1" stroke-width="1" opacity="0.5"/>
        </g>
      </g>
    </g>
  </g>

  <!-- Git - diamond branching icon -->
  <g transform="translate(400,225)">
    <g class="orbit-cw d6i">
      <g transform="translate(95,0)">
        <g class="unrotate-cw d6i">
          <circle r="20" fill="#141926" stroke="#F05032" stroke-width="1.3"/>
          <g transform="scale(0.85)">
            <path d="M13.1 1.3L1.3 13.1C0.5 13.9 0.5 15.1 1.3 15.9L-1 -1" fill="none"/>
            <path d="M0,-12 L12,0 L0,12 L-12,0 Z" fill="none" stroke="#F05032" stroke-width="2" stroke-linejoin="round"/>
            <circle cx="0" cy="-4" r="1.8" fill="#F05032"/>
            <circle cx="0" cy="4" r="1.8" fill="#F05032"/>
            <circle cx="4" cy="0" r="1.8" fill="#F05032"/>
            <line x1="0" y1="-2.2" x2="0" y2="2.2" stroke="#F05032" stroke-width="1.5"/>
            <path d="M0,-2 Q3,-2 4,-1.8" fill="none" stroke="#F05032" stroke-width="1.5"/>
          </g>
        </g>
      </g>
    </g>
  </g>

  <!-- Tailwind - wind wave -->
  <g transform="translate(400,225)">
    <g class="orbit-cw d7i">
      <g transform="translate(95,0)">
        <g class="unrotate-cw d7i">
          <circle r="20" fill="#141926" stroke="#06B6D4" stroke-width="1.3"/>
          <g transform="translate(-10,-6) scale(0.83)">
            <path d="M12 0C8.8 0 6.8 1.6 6 4.8C7.2 3.2 8.6 2.6 10.2 3.2C11.1 3.5 11.8 4.2 12.5 5C13.7 6.3 15.1 7.8 18 7.8C21.2 7.8 23.2 6.2 24 3C22.8 4.6 21.4 5.2 19.8 4.6C18.9 4.3 18.2 3.5 17.5 2.8C16.3 1.5 14.9 0 12 0Z" fill="#06B6D4"/>
            <path d="M6 7.8C2.8 7.8 0.8 9.4 0 12.6C1.2 11 2.6 10.4 4.2 11C5.1 11.3 5.8 12 6.5 12.8C7.7 14.1 9.1 15.6 12 15.6C15.2 15.6 17.2 14 18 10.8C16.8 12.4 15.4 13 13.8 12.4C12.9 12.1 12.2 11.3 11.5 10.6C10.3 9.3 8.9 7.8 6 7.8Z" fill="#06B6D4"/>
          </g>
        </g>
      </g>
    </g>
  </g>

  <!-- ===== OUTER ORBIT (r=175, counter-clockwise, 50s) ===== -->

  <!-- Flask - lab flask/beaker shape -->
  <g transform="translate(400,225)">
    <g class="orbit-ccw d0">
      <g transform="translate(175,0)">
        <g class="unrotate-ccw d0">
          <circle r="20" fill="#141926" stroke="#ffffff" stroke-width="1.3"/>
          <g transform="scale(1)">
            <path d="M-3,-11 L-3,-4 L-10,9 Q-11,11 -9,12 L9,12 Q11,11 10,9 L3,-4 L3,-11 Z" fill="none" stroke="#ffffff" stroke-width="1.4" stroke-linejoin="round"/>
            <line x1="-5" y1="-11" x2="5" y2="-11" stroke="#ffffff" stroke-width="1.4" stroke-linecap="round"/>
            <path d="M-7,6 Q0,3 7,6" fill="none" stroke="#ffffff" stroke-width="1" opacity="0.6"/>
          </g>
        </g>
      </g>
    </g>
  </g>

  <!-- FastAPI - lightning bolt -->
  <g transform="translate(400,225)">
    <g class="orbit-ccw d1o">
      <g transform="translate(175,0)">
        <g class="unrotate-ccw d1o">
          <circle r="20" fill="#141926" stroke="#009688" stroke-width="1.3"/>
          <path d="M2,-12 L-6,2 L-1,2 L-2,12 L6,-2 L1,-2 Z" fill="#009688"/>
        </g>
      </g>
    </g>
  </g>

  <!-- Node.js - hexagon with N -->
  <g transform="translate(400,225)">
    <g class="orbit-ccw d2o">
      <g transform="translate(175,0)">
        <g class="unrotate-ccw d2o">
          <circle r="20" fill="#141926" stroke="#339933" stroke-width="1.3"/>
          <polygon points="0,-12 10.4,-6 10.4,6 0,12 -10.4,6 -10.4,-6" fill="none" stroke="#339933" stroke-width="1.3" stroke-linejoin="round"/>
          <text y="5" text-anchor="middle" font-family="'Segoe UI',Helvetica,Arial,sans-serif" font-size="14" font-weight="900" fill="#339933">N</text>
        </g>
      </g>
    </g>
  </g>

  <!-- Docker - whale with containers -->
  <g transform="translate(400,225)">
    <g class="orbit-ccw d3o">
      <g transform="translate(175,0)">
        <g class="unrotate-ccw d3o">
          <circle r="20" fill="#141926" stroke="#2496ED" stroke-width="1.3"/>
          <g transform="translate(-11,-7) scale(0.88)">
            <!-- whale body -->
            <path d="M3,12 Q1,12 1,10 Q0,8 2,7 L4,7 L4,5 L7,5 L7,3 L10,3 L10,5 L13,5 L13,3 L16,3 L16,5 L19,5 L19,7 L22,7 Q24,8 23,11 Q22,14 18,15 Q14,16 10,15 Q6,14 3,12Z" fill="#2496ED"/>
            <!-- containers (small squares) -->
            <rect x="5" y="5" width="2" height="2" fill="#fff" opacity="0.9" rx="0.3"/>
            <rect x="8" y="5" width="2" height="2" fill="#fff" opacity="0.9" rx="0.3"/>
            <rect x="11" y="5" width="2" height="2" fill="#fff" opacity="0.9" rx="0.3"/>
            <rect x="8" y="3" width="2" height="2" fill="#fff" opacity="0.9" rx="0.3"/>
            <rect x="11" y="3" width="2" height="2" fill="#fff" opacity="0.9" rx="0.3"/>
            <rect x="14" y="5" width="2" height="2" fill="#fff" opacity="0.9" rx="0.3"/>
            <rect x="14" y="3" width="2" height="2" fill="#fff" opacity="0.9" rx="0.3"/>
            <rect x="17" y="5" width="2" height="2" fill="#fff" opacity="0.9" rx="0.3"/>
            <!-- whale eye -->
            <circle cx="21" cy="10" r="0.8" fill="#141926"/>
          </g>
        </g>
      </g>
    </g>
  </g>

  <!-- Supabase - lightning bolt in shield -->
  <g transform="translate(400,225)">
    <g class="orbit-ccw d4o">
      <g transform="translate(175,0)">
        <g class="unrotate-ccw d4o">
          <circle r="20" fill="#141926" stroke="#3FCF8E" stroke-width="1.3"/>
          <path d="M1,13 C1,13 -5,13 -2,5 L3,-12 L3,0 L7,0 L-1,13 Z" fill="#3FCF8E" opacity="0.7"/>
          <path d="M-1,-13 C-1,-13 5,-13 2,-5 L-3,12 L-3,0 L-7,0 L1,-13 Z" fill="#3FCF8E"/>
        </g>
      </g>
    </g>
  </g>

  <!-- MongoDB - leaf -->
  <g transform="translate(400,225)">
    <g class="orbit-ccw d5o">
      <g transform="translate(175,0)">
        <g class="unrotate-ccw d5o">
          <circle r="20" fill="#141926" stroke="#47A248" stroke-width="1.3"/>
          <g transform="translate(0,0)">
            <path d="M0,-12 C0,-12 -8,-2 -7,4 C-6,9 -2,12 0,13 C2,12 6,9 7,4 C8,-2 0,-12 0,-12Z" fill="#47A248"/>
            <path d="M0,-5 L0,12" stroke="#fff" stroke-width="1.2" opacity="0.5" stroke-linecap="round"/>
            <ellipse cx="0" cy="12.5" rx="1.5" ry="1" fill="#47A248" opacity="0.7"/>
          </g>
        </g>
      </g>
    </g>
  </g>

  <!-- AWS - arrow/smile -->
  <g transform="translate(400,225)">
    <g class="orbit-ccw d6o">
      <g transform="translate(175,0)">
        <g class="unrotate-ccw d6o">
          <circle r="20" fill="#141926" stroke="#FF9900" stroke-width="1.3"/>
          <g transform="translate(0,-1)">
            <text y="3" text-anchor="middle" font-family="'Segoe UI',Helvetica,Arial,sans-serif" font-size="10" font-weight="900" letter-spacing="0.5" fill="#ffffff">aws</text>
            <path d="M-9,5 Q0,10 9,5" fill="none" stroke="#FF9900" stroke-width="1.8" stroke-linecap="round"/>
            <path d="M6,4 L9,5 L8,8" fill="none" stroke="#FF9900" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
          </g>
        </g>
      </g>
    </g>
  </g>

</svg>
